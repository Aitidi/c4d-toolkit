name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo structure check
        run: |
          test -d plugins
          test -d scripts
          test -d docs
          test -d examples
          echo "Basic structure OK"
